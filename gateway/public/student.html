<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Education Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <nav class="bg-green-700 text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">Education Platform <br> <span class="text-blue-200 text-sm font-normal">Student Portal</span></h1>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <i class="fas fa-user-circle text-2xl text-white"></i>
                    <span id="student-welcome" class="text-sm font-medium">StudentName</span>
                </div>
                <button onclick="logout()" class="bg-green-700 hover:bg-green-800 px-4 py-2 rounded text-sm font-medium transition shadow-sm">
                    Log Out
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <main class="max-w-7xl mx-auto p-4 mt-4 flex-1 w-full grid grid-cols-1 md:grid-cols-4 gap-6">

        <!-- LEFT PANEL (Controls & Quiz) -->
        <div class="md:col-span-1 flex flex-col gap-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-2">Quiz Container</h2>
                <button id="start-quiz-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition shadow mb-3">
                    Start Quiz
                </button>
                <div id="quiz-container" class="flex-1 border rounded bg-slate-50 border-slate-100 p-3 text-sm flex flex-col gap-3 hidden ">
                    <p class="text-slate-400 italic text-center mt-2">Waiting for professor to start the quiz.</p>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL (Video Stream) -->
        <div class="md:col-span-3 bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">Live Class Stream</h2>
                <span class="text-xs font-bold text-red-500 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> LIVE
                </span>
            </div>
            
            <div class="bg-slate-900 rounded-lg flex-1 flex items-center justify-center min-h-[400px] md:min-h-[500px] relative overflow-hidden shadow-inner">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/hVrwuMnCtok" title="Live Class Stream" frameborder="0" allowfullscreen class="rounded min-h-[400px] md:min-h-[500px]"></iframe>   
            </div>
        </div>

    </main>

    <div id="quiz-details-modal" class="fixed z-20 inset-0 bg-black bg-opacity-40 flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md border border-slate-200 max-h-[90vh] flex flex-col">
            
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <h4 id="details-name" class="text-lg font-bold text-blue-600">Quiz Answers</h4>
                <button onclick="document.getElementById('quiz-details-modal').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 transition-colors">✕</button>
            </div>
    
            <div id="quiz-answers-container" class="overflow-y-auto pr-2 space-y-3 custom-scrollbar"> 
                </div>
    
            <div class="mt-6 flex-shrink-0">
                <button onclick="document.getElementById('quiz-details-modal').classList.add('hidden')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-bold transition-colors">
                    Done
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Auth Check
        document.addEventListener('DOMContentLoaded', () => {
            const role = sessionStorage.getItem('currentUserRole');
            const name = sessionStorage.getItem('currentUserName') || 'Student';
            const id = sessionStorage.getItem('currentUserId') || '';
            
            if (role !== 'student') {
                window.location.href = 'index.html';
            } else {
                document.getElementById('student-welcome').innerText = `${name}`;
            }
        });


      function logout() {
        //finish telemetry before logging out
        
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

       

  
    </script>
    <script src="student_app.js"></script>
</body>
</html>
