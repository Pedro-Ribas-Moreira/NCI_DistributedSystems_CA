syntax = "proto3";

package attendance;

service AttendanceService {
  // Simple RPC for students to check in [cite: 74]
  rpc StudentAttendenceCheckIn (StudentCheckIn) returns (StudentCheckInResponse);
  
  // Server-side streaming for professor to track the roster 
  rpc ProfessorAttendenceTracker (ProfessorAttendenceTrackerRequest) returns (stream ProfessorAttendenceTrackerResponse);
}

message StudentCheckIn {
  string student_id = 1;
  string student_location = 2;
}

message StudentCheckInResponse {
  string confirmation_response = 1;
}

message ProfessorAttendenceTrackerRequest {
  string professor_id = 1;
} 

message ProfessorAttendenceTrackerResponse {
  repeated StudentAttendanceInfo student_attendance_info = 1;
  string message = 2;
}

message StudentAttendanceInfo {
  string id = 1;
  string student_name = 2;
  bool check_in_status = 3;
  string location = 4;
}