syntax = "proto3";

package education;

// First Service - Student Check-In (Attendence)
// Student send message with their student_id and receive a confirmation back from server

service EducationService {
  rpc SendAttenceConfirmation (StudentCheckIn) returns (ConfirmationResponse);
  rpc ProfessorAttendenceTracker (ProfessorAttendenceTrackerRequest) returns (stream ProfessorAttendenceTrackerResponse);
}

message StudentCheckIn {
  string student_id = 1;
}

message ConfirmationResponse {
  string confirmationResponse = 1;
}


message ProfessorAttendenceTrackerRequest {
  string professor_id = 1;
} 

message ProfessorAttendenceTrackerResponse {
  string student_id = 1;
  string student_name = 2;
  string student_location = 3;
  string student_attendance_status = 4;
  string message = 5;
}