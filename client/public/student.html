<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Education Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">Education Platform <br> <span class="text-blue-200 text-sm font-normal">Student Portal</span></h1>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                    <span id="student-welcome" class="text-sm font-medium">Logged in</span>
                </div>
                <button onclick="logout()" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded text-sm font-medium transition shadow-sm">
                    Log Out
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <main class="max-w-7xl mx-auto p-4 mt-4 flex-1 w-full grid grid-cols-1 md:grid-cols-4 gap-6">

        <!-- LEFT PANEL (Controls & Quiz) -->
        <div class="md:col-span-1 flex flex-col gap-4">
            
            <!-- 1. Check-In Box -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-800 mb-2">1. Class Attendance</h2>
                <p class="text-xs text-slate-500 mb-4">Register your presence for today's lecture.</p>
                <button id="checkin-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition shadow mb-3">
                    Check In
                </button>
                <div id="checkin-status" class="p-2 bg-slate-50 text-xs rounded border border-slate-100 text-slate-600 text-center font-medium">
                    Status: Pending
                </div>
            </div>

            <!-- 2. Telemetry / Engagement Box -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-800 mb-2">2. Engagement Tracker</h2>
                <p class="text-xs text-slate-500 mb-4">Stream telemetry data to your professor.</p>
                <button id="telemetry-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition shadow mb-3">
                    Start Telemetry
                </button>
            </div>

            <!-- 3. Active Quiz Section -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-2">3. Live Quiz</h2>
                <span class="inline-block bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded font-bold mb-4 w-max">Awaiting Stream...</span>
                
                <div id="quiz-container" class="flex-1 border rounded bg-slate-50 border-slate-100 p-3 text-sm flex flex-col gap-3">
                    <p class="text-slate-400 italic text-center mt-2">Waiting for professor to start the quiz.</p>
                </div>
            </div>

        </div>

        <!-- RIGHT PANEL (Video Stream) -->
        <div class="md:col-span-3 bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-slate-800">Live Class Stream</h2>
                <span class="text-xs font-bold text-red-500 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-red-500"></span> LIVE
                </span>
            </div>
            
            <div class="bg-slate-900 rounded-lg flex-1 flex items-center justify-center min-h-[400px] md:min-h-[500px] relative overflow-hidden shadow-inner">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/hVrwuMnCtok" title="Live Class Stream" frameborder="0" allowfullscreen class="rounded min-h-[400px] md:min-h-[500px]"></iframe>   
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Auth Check
        document.addEventListener('DOMContentLoaded', () => {
            const role = sessionStorage.getItem('currentUserRole');
            const name = sessionStorage.getItem('currentUserName') || 'Student';
            const id = sessionStorage.getItem('currentUserId') || '';
            
            if (role !== 'student') {
                window.location.href = 'index.html';
            } else {
                document.getElementById('student-welcome').innerText = `Logged in as: ${name} (ID: ${id})`;
            }
        });

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
    <script src="student_app.js"></script>
</body>
</html>
