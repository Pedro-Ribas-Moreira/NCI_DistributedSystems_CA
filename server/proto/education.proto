syntax = "proto3";

package education;

// First Service - Student Check-In (Attendence)
// Student send message with their student_id and receive a confirmation back from server

service EducationService {

// simple RPC:
  rpc StudentAttendenceCheckIn (StudentCheckIn) returns (ConfirmationResponse);
  rpc StudentQuizRequest (QuizDispatcherRequest) returns ( QuizDispatcherResponse);
  rpc StudentQuizSubmission (stream QuizSubmissionRequest) returns (stream QuizSubmissionResponse);
// client streaming
  rpc StudentTelemetry (stream StudentTelemetryRequest) returns (StudentTelemetryResponse);


// server streaming
  rpc ProfessorAttendenceTracker (ProfessorAttendenceTrackerRequest) returns (stream ProfessorAttendenceTrackerResponse);
  rpc ProfessorQuizTracer (ProfessorQuizTracerRequest) returns (stream ProfessorQuizTracerResponse);


// bidirectional streaming  
  rpc ProfessorLiveTracker (stream ProfessorLiveTrackerRequest) returns (stream ProfessorLiveTrackerResponse);

}

message StudentCheckIn {
  string student_id = 1;
}

message ConfirmationResponse {
  string confirmationResponse = 1;
}


message ProfessorAttendenceTrackerRequest {
  string professor_id = 1;
} 

message ProfessorAttendenceTrackerResponse {
  string student_id = 1;
  string student_name = 2;
  string student_location = 3;
  string student_attendance_status = 4;
  string message = 5;
}

message ProfessorQuizTracerRequest {
  string professor_id = 1;
}

message ProfessorQuizTracerResponse {
  string student_id = 1;
  string student_name = 2;
  string quiz_status = 3;
  string message = 4;
}