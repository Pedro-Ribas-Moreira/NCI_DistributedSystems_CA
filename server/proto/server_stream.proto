syntax = "proto3";

package serverstreamdemo;

// Server streaming RPC:
// client sends one request
// server sends many responses
service ServerStreamService {
  rpc GetBooksByCategory (CategoryRequest) returns (stream BookResponse);
}

message CategoryRequest {
  string category = 1;
}

message BookResponse {
  int32 id = 1;
  string title = 2;
  string category = 3;
}